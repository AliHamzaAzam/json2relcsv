# CI guard for the json2relcsv WASM playground.
#
# Deployment is handled by Cloudflare Pages' Git integration (connect the repo in
# the Cloudflare dashboard), so there are NO secrets here. Cloudflare builds the
# site with `npm run build` from the `web/` directory; the self-contained WASM
# module (web/src/wasm/json2relcsv.mjs) is committed, so the cloud build needs
# only Node — no Emscripten/flex/bison.
#
# This workflow just guards quality: it verifies the committed artifact + app
# build and tests pass, and that the C → WASM pipeline still builds (so the
# committed .mjs can be regenerated with `npm run build:wasm`).

name: CI

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "web/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "web/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    # Validates exactly what Cloudflare Pages ships: the committed WASM artifact,
    # the test suite, and the production build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Test
        working-directory: web
        run: npm test
      - name: Production build
        working-directory: web
        run: npm run build

  toolchain:
    # Ensures the C tool still builds and behaves, and that the committed WASM
    # module can be regenerated from source. Does not deploy.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flex, bison, cmake
        run: sudo apt-get update && sudo apt-get install -y flex bison cmake
      - name: C golden test
        run: bash tests/golden_test.sh
      - uses: mymindstorm/setup-emsdk@v14
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Rebuild WASM and run smoke test
        run: |
          bash web/build-wasm.sh
          node web/test/smoke.mjs
